version: 2

project_name: get-feishu-docs

before:
  hooks:
    - go test ./...

builds:
  - id: get-feishu-docs
    main: ./cmd/get-feishu-docs
    binary: get-feishu-docs
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath

archives:
  - id: default
    ids:
      - get-feishu-docs
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: wangnov
    name: get-feishu-docs
  draft: false
  prerelease: auto

snapshot:
  version_template: "{{ incpatch .Version }}-next"
