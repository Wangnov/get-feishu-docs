version: 2

project_name: get-feishu-docs

before:
  hooks:
    - go test ./...

builds:
  - id: get-feishu-docs
    main: ./cmd/get-feishu-docs
    binary: get-feishu-docs
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath

archives:
  - id: default
    ids:
      - get-feishu-docs
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: wangnov
    name: get-feishu-docs
  draft: false
  prerelease: auto

brews:
  - name: get-feishu-docs
    repository:
      owner: Wangnov
      name: homebrew-tap
      branch: main
      token: "{{ .Env.GH_PAT }}"
    directory: Formula
    homepage: "https://github.com/Wangnov/get-feishu-docs"
    description: "CLI for exporting Feishu documents into stable local deliverables."
    license: "MIT"
    commit_author:
      name: Wangnov
      email: 48670012+Wangnov@users.noreply.github.com
    test: |
      system "#{bin}/get-feishu-docs", "--version"
    install: |
      bin.install "get-feishu-docs"

winget:
  - name: get-feishu-docs
    publisher: Wangnov
    package_identifier: Wangnov.GetFeishuDocs
    package_name: get-feishu-docs
    short_description: "CLI for exporting Feishu documents into stable local deliverables."
    description: "Export Feishu documents into local HTML, PNG, PDF, Markdown, assets, and manifest outputs."
    license: "MIT"
    homepage: "https://github.com/Wangnov/get-feishu-docs"
    publisher_url: "https://github.com/Wangnov"
    publisher_support_url: "https://github.com/Wangnov/get-feishu-docs/issues"
    license_url: "https://github.com/Wangnov/get-feishu-docs/blob/main/LICENSE"
    tags:
      - cli
      - feishu
      - docs
      - export
      - golang
    release_notes: "{{ .Changelog }}"
    repository:
      owner: Wangnov
      name: winget-pkgs
      branch: "get-feishu-docs-{{ .Version }}"
      token: "{{ .Env.GH_PAT }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    commit_author:
      name: Wangnov
      email: 48670012+Wangnov@users.noreply.github.com

snapshot:
  version_template: "{{ incpatch .Version }}-next"
